server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: autor-service
              uri: http://localhost:8081
              predicates:
                - Path=/autores/**

            - id: genero-service
              uri: http://localhost:8082
              predicates:
                - Path=/generos/**

            - id: libro-service
              uri: http://localhost:8083
              predicates:
                - Path=/libros/**

            - id: nombre-service
              uri: http://localhost:8084
              predicates:
                - Path=/nombres/**

            - id: domicilio-service
              uri: http://localhost:8085
              predicates:
                - Path=/domicilios/**

            - id: usuario-service
              uri: http://localhost:8086
              predicates:
                - Path=/usuarios/**

            - id: bibliotecario-service
              uri: http://localhost:8087
              predicates:
                - Path=/bibliotecarios/**

            - id: turnos-service
              uri: http://localhost:8088
              predicates:
                - Path=/turnos/**

            - id: bodega-service
              uri: http://localhost:8089
              predicates:
                - Path=/bodegas/**

            - id: estante-service
              uri: http://localhost:8090
              predicates:
                - Path=/estantes/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,gateway